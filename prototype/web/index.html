<!DOCTYPE html>
<html class="light" lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta content="width=device-width, initial-scale=1.0" name="viewport">
  <title>BattleSwitchLab - Account Switcher</title>
  <link href="/logo.png" rel="icon" type="image/png">
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet">
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            primary: "#1da1f2",
            "primary-dark": "#0d8fe0",
            background: "#f7f9fb",
            surface: "#ffffff",
            "surface-soft": "#f4f7fa",
            "surface-muted": "#eef3f7",
            stroke: "#dce3ea",
            ink: "#101828",
            "ink-soft": "#667085",
            danger: "#ef4444"
          },
          boxShadow: {
            shell: "0 18px 44px rgba(16, 24, 40, 0.08), 0 2px 8px rgba(16, 24, 40, 0.04)",
            card: "0 4px 14px rgba(15, 23, 42, 0.05)"
          },
          borderRadius: {
            shell: "16px",
            card: "14px",
            button: "12px"
          }
        }
      }
    };
  </script>
  <style>
    :root {
      color-scheme: light;
    }

    html {
      height: 100%;
      background: #f7f9fb;
    }

    body {
      min-height: 100%;
      font-family: "Inter", sans-serif;
      background: linear-gradient(180deg, #fbfcfe 0%, #f7f9fb 100%);
      margin: 0;
    }

    .material-symbols-outlined {
      font-variation-settings: "FILL" 0, "wght" 500, "GRAD" 0, "opsz" 24;
      vertical-align: middle;
    }

    .mono {
      font-family: "JetBrains Mono", monospace;
    }

    .row-selected {
      background: linear-gradient(90deg, rgba(29, 161, 242, 0.14) 0%, rgba(29, 161, 242, 0.08) 100%);
      box-shadow: inset 4px 0 0 #1da1f2;
    }

    .hover-lift {
      transition: transform 180ms ease, box-shadow 180ms ease, background-color 180ms ease, border-color 180ms ease;
    }

    .hover-lift:hover {
      transform: translateY(-1px);
    }

    .press-scale:active {
      transform: scale(0.98);
    }

    .debug-hidden {
      display: none;
    }

    .notice-success {
      border-color: rgba(34, 197, 94, 0.24);
      background: rgba(34, 197, 94, 0.1);
      color: #166534;
    }

    .notice-error {
      border-color: rgba(239, 68, 68, 0.24);
      background: rgba(239, 68, 68, 0.08);
      color: #b91c1c;
    }

    .notice-idle {
      visibility: hidden;
      opacity: 0;
    }
  </style>
</head>
<body class="min-h-screen text-ink">
  <div class="min-h-screen bg-surface">
    <main class="flex min-h-screen flex-col">
      <section class="flex-1 bg-surface">
        <div class="border-b border-stroke px-8 py-5">
          <div class="flex items-center gap-3">
            <img alt="YiboBattleSwitch Logo" class="h-11 w-11 rounded-[12px] object-cover shadow-sm" src="/logo.png" onerror="this.style.display='none'">
            <div>
              <div class="flex items-center gap-3">
                <span class="text-[15px] font-bold text-primary" id="wordmark">YiboBattleSwitch</span>
                <span class="text-[13px] text-slate-400" id="versionLabel">v0.1</span>
                <span class="text-[13px] text-slate-300">/</span>
                <span class="text-[15px] font-semibold text-ink" id="appTitleInline">暴雪战网Battle.net切换工具</span>
              </div>
            </div>
          </div>
        </div>

        <div class="w-full flex-1 px-8 pt-3 pb-4">
        <section class="mt-3 rounded-card border border-stroke bg-surface-soft px-6 py-5 shadow-card">
          <div class="flex items-center justify-between gap-4">
            <span class="text-[13px] font-bold text-ink">安装目录</span>
            <div class="h-[40px] flex-1 px-4">
              <div class="notice-idle rounded-[10px] border px-4 py-2 text-[14px] font-medium transition-opacity" id="noticeBanner"></div>
            </div>
          </div>
          <div class="mt-4 flex items-center gap-3">
            <div class="relative flex-1 overflow-hidden rounded-[10px] border border-stroke bg-surface">
              <span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400">folder_open</span>
              <input class="mono h-12 w-full border-0 bg-transparent pl-12 pr-[180px] text-[14px] text-ink outline-none ring-0" id="gameDirField" type="text">
              <div class="absolute inset-y-0 right-2 flex items-center gap-2">
                <button class="hidden h-8 rounded-[8px] bg-primary px-3 text-[13px] font-semibold text-white shadow-[0_8px_18px_rgba(29,161,242,0.22)]" id="confirmGameDirBtn" type="button">确认</button>
                <button class="h-8 rounded-[8px] border border-stroke bg-surface-soft px-3 text-[13px] font-semibold text-ink hover:bg-white" id="pickFolderBtn" type="button">手动选择</button>
              </div>
            </div>
            <button class="hover-lift press-scale h-12 rounded-[10px] border border-stroke bg-surface px-5 text-[14px] font-semibold text-ink shadow-sm" id="autoSearchBtn" type="button">自动搜索</button>
          </div>
        </section>

        <section class="mt-6">
          <div class="flex flex-wrap items-center gap-3">
            <button class="hover-lift press-scale flex h-12 items-center gap-2 rounded-button bg-primary px-9 text-[15px] font-bold text-white shadow-[0_10px_22px_rgba(29,161,242,0.28)]" id="switchBtn" type="button">
              <span class="material-symbols-outlined" style='font-variation-settings:"FILL" 1, "wght" 600, "GRAD" 0, "opsz" 24'>login</span>
              切换到此账号
            </button>
            <div class="mx-1 h-9 w-px bg-stroke"></div>
            <button class="hover-lift press-scale flex h-12 items-center gap-2 rounded-button border border-stroke bg-surface px-5 text-[14px] font-semibold text-ink shadow-sm" id="saveBtn" type="button">
              <span class="material-symbols-outlined text-[18px] text-slate-600">save</span>
              保存当前登录
            </button>
            <button class="hover-lift press-scale flex h-12 items-center gap-2 rounded-button border border-stroke bg-surface px-5 text-[14px] font-semibold text-ink shadow-sm" id="backupBtn" type="button">
              <span class="material-symbols-outlined text-[18px] text-slate-600">backup</span>
              备份库
            </button>
            <button class="hover-lift press-scale flex h-12 items-center gap-2 rounded-button border border-stroke bg-surface px-5 text-[14px] font-semibold text-ink shadow-sm" id="importBtn" type="button">
              <span class="material-symbols-outlined text-[18px] text-slate-600">upload_file</span>
              导入库
            </button>
            <div class="ml-auto flex items-center gap-6 text-[14px]">
              <button class="flex items-center gap-1.5 text-ink hover:text-primary" id="noteBtn" type="button">
                <span class="material-symbols-outlined text-[18px]">edit</span>
                备注
              </button>
              <button class="flex items-center gap-1.5 text-danger hover:opacity-75" id="deleteBtn" type="button">
                <span class="material-symbols-outlined text-[18px]">delete</span>
                删除
              </button>
            </div>
          </div>
        </section>

        <section class="mt-5 overflow-hidden rounded-card border border-stroke bg-surface shadow-card">
          <div class="grid grid-cols-[56px_1.2fr_1.1fr_1fr_44px] border-b border-stroke bg-surface-soft px-4 py-4 text-[13px] font-bold text-slate-500">
            <div></div>
            <div>账号名称</div>
            <div>备注信息</div>
            <div>最后同步时间</div>
            <div></div>
          </div>
          <div id="rows" class="divide-y divide-stroke"></div>
        </section>

        <section id="debugPanel" class="debug-hidden mt-6 rounded-card border border-stroke bg-surface px-5 py-4 shadow-card">
          <div class="flex items-center justify-between">
            <h2 class="text-[14px] font-bold text-ink">调试面板</h2>
            <button class="text-[13px] font-semibold text-primary" id="hideDebugBtn" type="button">收起</button>
          </div>
          <div class="mt-4 grid gap-4 md:grid-cols-2">
            <div class="rounded-[12px] border border-stroke bg-surface-soft p-4">
              <div class="text-[13px] font-semibold text-ink">当前状态</div>
              <div class="mt-3 space-y-2 text-[13px] text-ink-soft" id="debugState"></div>
            </div>
            <div class="rounded-[12px] border border-stroke bg-surface-soft p-4">
              <div class="text-[13px] font-semibold text-ink">目录信息</div>
              <div class="mt-3 space-y-2 text-[13px] text-ink-soft" id="debugDirs"></div>
            </div>
          </div>
          <div class="mt-4 flex flex-wrap items-center gap-3">
            <button class="hover-lift press-scale rounded-[10px] border border-stroke bg-surface px-4 py-2 text-[13px] font-semibold text-ink shadow-sm" id="importNewBeeBoxBtn" type="button">导入 NewBeeBox</button>
            <button class="hover-lift press-scale rounded-[10px] border border-stroke bg-surface px-4 py-2 text-[13px] font-semibold text-ink shadow-sm" id="restoreBackupBtn" type="button">恢复最近一次备份</button>
            <button class="hover-lift press-scale rounded-[10px] border border-stroke bg-surface px-4 py-2 text-[13px] font-semibold text-ink shadow-sm" id="backupStateBtn" type="button">备份当前状态</button>
            <button class="hover-lift press-scale rounded-[10px] border border-stroke bg-surface px-4 py-2 text-[13px] font-semibold text-ink shadow-sm" id="diagnosticSnapshotBtn" type="button">诊断快照</button>
            <button class="hover-lift press-scale rounded-[10px] border border-stroke bg-surface px-4 py-2 text-[13px] font-semibold text-ink shadow-sm" id="compareDiagnosticsBtn" type="button">比较最近两次诊断</button>
          </div>
          <div class="mt-4 rounded-[12px] border border-stroke bg-surface-soft p-4">
            <div class="text-[13px] font-semibold text-ink">日志</div>
            <div class="mt-3 space-y-2 text-[13px] text-ink-soft" id="logLines"></div>
          </div>
        </section>
        </div>

      </section>
      <footer class="border-t border-stroke px-8 py-4">
        <div class="flex items-center justify-between text-[14px]">
          <div class="text-slate-400">YiboBattleSwitch@2026 - YiboSoft</div>
          <div class="flex items-center gap-6">
            <button class="text-ink hover:text-primary" id="debugLink" type="button">调试</button>
            <button class="text-ink hover:text-primary" id="aboutLink" type="button">关于</button>
          </div>
        </div>
      </footer>
    </main>
  </div>

  <dialog class="overflow-hidden rounded-[16px] border border-stroke p-0 shadow-shell backdrop:bg-slate-900/20" id="aboutDialog">
    <div class="w-[680px] max-w-[calc(100vw-32px)] bg-surface p-6">
      <div class="flex items-start justify-between">
        <div class="flex items-start gap-3">
          <img alt="YiboBattleSwitch Logo" class="mt-0.5 h-10 w-10 rounded-[10px] object-cover shadow-sm" src="/logo.png" onerror="this.style.display='none'">
          <div>
            <h2 class="text-[20px] font-bold text-ink">YiboBattleSwitch</h2>
            <p class="mt-1 text-[14px] text-ink-soft">Battle.net / WoW 多账号本地切换工具</p>
          </div>
        </div>
        <button class="text-slate-400 hover:text-ink" id="closeAboutTop" type="button">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <div class="mt-5 space-y-4 text-[14px] text-ink-soft">
        <div id="aboutVersion"></div>
        <div class="break-all" id="aboutLibraryDir"></div>
        <div class="break-all" id="aboutDataDir"></div>
        <div>请先确认安装目录，再执行备份或切换。</div>
      </div>
    </div>
  </dialog>

  <dialog class="rounded-[16px] border border-stroke p-0 shadow-shell backdrop:bg-slate-900/25" id="formDialog">
    <form class="w-[460px] bg-surface p-6" id="formDialogForm" method="dialog">
      <div class="flex items-center justify-between">
        <h2 class="text-[18px] font-bold text-ink" id="formDialogTitle">操作</h2>
        <button class="text-slate-400 hover:text-ink" id="formDialogClose" type="button">
          <span class="material-symbols-outlined">close</span>
        </button>
      </div>
      <p class="mt-2 text-[14px] text-ink-soft" id="formDialogHint"></p>
      <div class="mt-5 space-y-4" id="formDialogFields"></div>
      <div class="mt-6 flex justify-end gap-3">
        <button class="hover-lift press-scale rounded-[10px] border border-stroke bg-surface px-4 py-2 text-[14px] font-semibold text-ink shadow-sm" id="formDialogCancel" type="button">取消</button>
        <button class="hover-lift press-scale rounded-[10px] bg-primary px-4 py-2 text-[14px] font-semibold text-white shadow-[0_10px_22px_rgba(29,161,242,0.22)]" id="formDialogSubmit" type="submit">确认</button>
      </div>
    </form>
  </dialog>

  <dialog class="rounded-[16px] border border-stroke p-0 shadow-shell backdrop:bg-slate-900/25" id="confirmDialog">
    <div class="w-[420px] bg-surface p-6">
      <h2 class="text-[18px] font-bold text-ink" id="confirmDialogTitle">请确认</h2>
      <p class="mt-3 whitespace-pre-line text-[14px] text-ink-soft" id="confirmDialogMessage"></p>
      <div class="mt-6 flex justify-end gap-3">
        <button class="hover-lift press-scale rounded-[10px] border border-stroke bg-surface px-4 py-2 text-[14px] font-semibold text-ink shadow-sm" id="confirmDialogCancel" type="button">取消</button>
        <button class="hover-lift press-scale rounded-[10px] bg-primary px-4 py-2 text-[14px] font-semibold text-white shadow-[0_10px_22px_rgba(29,161,242,0.22)]" id="confirmDialogOk" type="button">确认</button>
      </div>
    </div>
  </dialog>

  <dialog class="rounded-[16px] border border-stroke p-0 shadow-shell backdrop:bg-slate-900/25" id="messageDialog">
    <div class="w-[440px] bg-surface p-6">
      <div class="flex items-start gap-3">
        <img alt="YiboBattleSwitch Logo" class="h-10 w-10 rounded-[10px] object-cover shadow-sm" src="/logo.png" onerror="this.style.display='none'">
        <div class="min-w-0 flex-1">
          <h2 class="text-[18px] font-bold text-ink" id="messageDialogTitle">提示</h2>
          <p class="mt-3 whitespace-pre-line text-[14px] text-ink-soft" id="messageDialogBody"></p>
        </div>
      </div>
      <div class="mt-6 flex justify-end">
        <button class="hover-lift press-scale rounded-[10px] bg-primary px-4 py-2 text-[14px] font-semibold text-white shadow-[0_10px_22px_rgba(29,161,242,0.22)]" id="messageDialogOk" type="button">知道了</button>
      </div>
    </div>
  </dialog>

  <script>
    const state = {
      selectedEmail: "",
      payload: null,
      hasDesktopBridge: false,
      gameDirDraft: "",
      confirmResolve: null,
      formResolve: null,
      messageResolve: null
    };

    async function postAction(action, payload = {}) {
      const response = await fetch(`/api/action/${action}`, {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify(payload)
      });
      const data = await response.json();
      if (!data.ok) {
        throw new Error(data.message || "请求失败");
      }
      if (data.state) {
        applyState(data.state);
      }
      return data.message || "操作完成";
    }

    function showNotice(message, kind = "success") {
      const banner = document.getElementById("noticeBanner");
      banner.textContent = message;
      banner.className = `rounded-[10px] border px-4 py-2 text-[14px] font-medium transition-opacity ${kind === "error" ? "notice-error" : "notice-success"}`;
    }

    function clearNotice() {
      const banner = document.getElementById("noticeBanner");
      banner.textContent = "";
      banner.className = "notice-idle rounded-[10px] border px-4 py-2 text-[14px] font-medium transition-opacity";
    }

    function showMessage(message, title = "提示") {
      const dialog = document.getElementById("messageDialog");
      document.getElementById("messageDialogTitle").textContent = title;
      document.getElementById("messageDialogBody").textContent = message;
      dialog.showModal();
      return new Promise((resolve) => {
        state.messageResolve = resolve;
      });
    }

    function currentAccount() {
      return state.payload?.accounts.find((item) => item.email === state.selectedEmail) || null;
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function closeDialog(dialog) {
      if (dialog.open) {
        dialog.close();
      }
    }

    function syncGameDirEditor() {
      const input = document.getElementById("gameDirField");
      const confirmBtn = document.getElementById("confirmGameDirBtn");
      const currentValue = state.payload?.gameDirectory || "";
      const draftValue = input.value.trim();
      state.gameDirDraft = draftValue;
      confirmBtn.classList.toggle("hidden", draftValue === currentValue || draftValue === "");
    }

    async function chooseDirectory(initialPath = "") {
      if (!window.pywebview?.api?.choose_directory) {
        return "";
      }
      try {
        const selected = await window.pywebview.api.choose_directory(initialPath || "");
        return selected || "";
      } catch (error) {
        console.error(error);
        return "";
      }
    }

    function askConfirm(title, message) {
      const dialog = document.getElementById("confirmDialog");
      document.getElementById("confirmDialogTitle").textContent = title;
      document.getElementById("confirmDialogMessage").textContent = message;
      dialog.showModal();
      return new Promise((resolve) => {
        state.confirmResolve = resolve;
      });
    }

    function askForm(config) {
      const dialog = document.getElementById("formDialog");
      const titleEl = document.getElementById("formDialogTitle");
      const hintEl = document.getElementById("formDialogHint");
      const fieldsEl = document.getElementById("formDialogFields");
      const submitEl = document.getElementById("formDialogSubmit");

      titleEl.textContent = config.title;
      hintEl.textContent = config.hint || "";
      submitEl.textContent = config.submitText || "确认";
      fieldsEl.innerHTML = config.fields.map((field) => {
        const value = escapeHtml(field.value || "");
        if (field.type === "textarea") {
          return `
            <label class="block">
              <span class="mb-2 block text-[13px] font-semibold text-ink">${field.label}</span>
              <textarea class="min-h-[96px] w-full rounded-[10px] border border-stroke bg-surface px-3 py-2 text-[14px] text-ink outline-none" data-field="${field.name}" placeholder="${escapeHtml(field.placeholder || "")}">${value}</textarea>
            </label>
          `;
        }
        return `
          <label class="block">
            <span class="mb-2 block text-[13px] font-semibold text-ink">${field.label}</span>
            <input class="w-full rounded-[10px] border border-stroke bg-surface px-3 py-2 text-[14px] text-ink outline-none" data-field="${field.name}" type="${field.type || "text"}" value="${value}" placeholder="${escapeHtml(field.placeholder || "")}">
          </label>
        `;
      }).join("");

      dialog.showModal();
      return new Promise((resolve) => {
        state.formResolve = { resolve, config };
      });
    }

    function renderRows(accounts) {
      const rows = document.getElementById("rows");
      rows.innerHTML = "";

      accounts.forEach((account, index) => {
        const row = document.createElement("button");
        row.type = "button";
        row.className = [
          "grid w-full grid-cols-[56px_1.2fr_1.1fr_1fr_44px] items-center px-4 py-6 text-left",
          "transition-colors duration-150 hover:bg-surface-soft",
          account.email === state.selectedEmail ? "row-selected" : ""
        ].join(" ");
        row.dataset.email = account.email;
        row.innerHTML = `
          <div class="flex items-center justify-center text-slate-300">
            <span class="material-symbols-outlined text-[18px]">drag_indicator</span>
          </div>
          <div class="text-[15px] font-semibold ${account.email === state.selectedEmail ? "text-primary" : "text-ink"}">${account.maskedEmail}</div>
          <div class="text-[15px] text-ink">${account.description}</div>
          <div class="text-[14px] text-ink-soft">${account.lastSaved}</div>
          <div class="flex justify-end">
            ${account.email === state.selectedEmail ? '<span class="material-symbols-outlined text-[18px] text-primary" style=\'font-variation-settings:"FILL" 1, "wght" 700, "GRAD" 0, "opsz" 24\'>check_circle</span>' : ""}
          </div>
        `;
        row.addEventListener("click", () => {
          state.selectedEmail = account.email;
          renderRows(state.payload.accounts);
        });
        if (index === 0 && !state.selectedEmail) {
          state.selectedEmail = account.email;
        }
        rows.appendChild(row);
      });
    }

    function renderDebug(payload) {
      const wowAccounts = payload.wowAccounts.length ? payload.wowAccounts.join("、") : "-";
      document.getElementById("debugState").innerHTML = `
        <div>当前 Battle.net 登录候选：${payload.currentLoginName}</div>
        <div>当前子账号：${payload.currentGameAccount}</div>
        <div>WoW 子账号：${wowAccounts}</div>
        <div>账号库数量：${payload.accountCount}</div>
        <div>可导入数量：${payload.importableCount}</div>
        <div>当前权限：${payload.permissionLabel}</div>
      `;
      document.getElementById("debugDirs").innerHTML = `
        <div>安装目录：${payload.gameDirectory || "-"}</div>
        <div>账号库目录：${payload.libraryDirectory}</div>
        <div>数据目录：${payload.dataDirectory}</div>
      `;
      document.getElementById("aboutVersion").textContent = `版本号：v${payload.version}`;
      document.getElementById("aboutLibraryDir").textContent = `账号库目录：${payload.libraryDirectory}`;
      document.getElementById("aboutDataDir").textContent = `数据目录：${payload.dataDirectory}`;
      document.getElementById("logLines").innerHTML = payload.logs.length
        ? payload.logs.map((line) => `<div>${line}</div>`).join("")
        : "<div>暂无日志。</div>";
    }

    function applyState(payload) {
      state.payload = payload;
      if (!payload.accounts.some((item) => item.email === state.selectedEmail)) {
        state.selectedEmail = payload.accounts[0]?.email || "";
      }

      document.getElementById("wordmark").textContent = payload.appName;
      document.getElementById("versionLabel").textContent = `v${payload.version}`;
      document.getElementById("gameDirField").value = payload.gameDirectory || "";
      state.gameDirDraft = payload.gameDirectory || "";
      syncGameDirEditor();
      renderRows(payload.accounts);
      renderDebug(payload);
    }

    function bindStaticActions() {
      document.getElementById("switchBtn").addEventListener("click", async () => {
        if (!state.selectedEmail) {
          showMessage("请先选择一个账号。");
          return;
        }
        const ok = await askConfirm("确认切换", `确认切换到 ${state.selectedEmail} 吗？\n\n程序会先备份当前状态，再关闭 Battle.net / Agent，恢复目标账号并重新启动 Battle.net。`);
        if (!ok) {
          return;
        }
        try {
          const message = await postAction("switch-account", { email: state.selectedEmail });
          showNotice(message, "success");
        } catch (error) {
          showNotice(error.message, "error");
          await showMessage(error.message, "切换失败");
        }
      });

      document.getElementById("saveBtn").addEventListener("click", async () => {
        const result = await askForm({
          title: "保存当前登录",
          hint: "把当前 Battle.net 登录状态保存到本地账号库。",
          submitText: "保存",
          fields: [
            { name: "accountName", label: "账号名称或邮箱", value: state.payload?.currentLoginName || "" },
            { name: "description", label: "备注", type: "textarea", value: "" }
          ]
        });
        if (!result) {
          return;
        }
        try {
          const message = await postAction("save-current-account", result);
          showNotice(message, "success");
        } catch (error) {
          showNotice(error.message, "error");
          await showMessage(error.message, "保存失败");
        }
      });

      document.getElementById("backupBtn").addEventListener("click", async () => {
        let selectedPath = await chooseDirectory(state.payload?.gameDirectory || "");
        if (!selectedPath) {
          const result = await askForm({
            title: "备份账号库",
            hint: "优先选择一个输出目录来生成 zip 备份，也可以直接输入路径。",
            submitText: "开始备份",
            fields: [
              { name: "path", label: "输出目录", value: state.payload?.gameDirectory || "" }
            ]
          });
          if (!result) {
            return;
          }
          selectedPath = result.path || "";
        }
        try {
          const message = await postAction("backup-library", { path: selectedPath });
          showNotice(message, "success");
        } catch (error) {
          showNotice(error.message, "error");
          await showMessage(error.message, "备份失败");
        }
      });

      document.getElementById("importBtn").addEventListener("click", async () => {
        let selectedPath = await chooseDirectory(state.payload?.libraryDirectory || "");
        if (!selectedPath) {
          const result = await askForm({
            title: "导入账号库",
            hint: "优先选择账号库目录；如果取消选择，也可以直接输入路径。",
            submitText: "导入",
            fields: [
              { name: "path", label: "目录路径", value: "" }
            ]
          });
          if (!result) {
            return;
          }
          selectedPath = result.path || "";
        }
        try {
          const message = await postAction("import-library", { path: selectedPath });
          showNotice(message, "success");
        } catch (error) {
          showNotice(error.message, "error");
          await showMessage(error.message, "导入失败");
        }
      });

      document.getElementById("noteBtn").addEventListener("click", async () => {
        if (!state.selectedEmail) {
          showMessage("请先选择一个账号。");
          return;
        }
        const account = currentAccount();
        const result = await askForm({
          title: "修改备注",
          hint: `当前账号：${state.selectedEmail}`,
          submitText: "保存",
          fields: [
            { name: "description", label: "备注", type: "textarea", value: account?.description === "-" ? "" : (account?.description || "") }
          ]
        });
        if (!result) {
          return;
        }
        try {
          const message = await postAction("update-note", { email: state.selectedEmail, description: result.description || "" });
          showNotice(message, "success");
        } catch (error) {
          showNotice(error.message, "error");
          await showMessage(error.message, "修改备注失败");
        }
      });

      document.getElementById("deleteBtn").addEventListener("click", async () => {
        if (!state.selectedEmail) {
          showMessage("请先选择一个账号。");
          return;
        }
        const ok = await askConfirm("确认删除", `确认删除账号 ${state.selectedEmail} 吗？\n\n这个操作会删除本地账号库中的对应目录。`);
        if (!ok) {
          return;
        }
        try {
          const message = await postAction("delete-account", { email: state.selectedEmail });
          showNotice(message, "success");
        } catch (error) {
          showNotice(error.message, "error");
          await showMessage(error.message, "删除失败");
        }
      });

      document.getElementById("autoSearchBtn").addEventListener("click", async () => {
        try {
          const message = await postAction("auto-detect-dir");
          showNotice(message, "success");
        } catch (error) {
          showNotice(error.message, "error");
          await showMessage(error.message, "识别失败");
        }
      });

      document.getElementById("pickFolderBtn").addEventListener("click", async () => {
        let selectedPath = await chooseDirectory(state.payload?.gameDirectory || "");
        if (!selectedPath) {
          const result = await askForm({
            title: "设置安装目录",
            hint: "请选择 Battle.net 或 World of Warcraft 安装目录，也可以直接输入路径。",
            submitText: "保存",
            fields: [
              { name: "path", label: "目录路径", value: state.payload?.gameDirectory || "" }
            ]
          });
          if (!result) {
            return;
          }
          selectedPath = result.path || "";
        }
        document.getElementById("gameDirField").value = selectedPath;
        syncGameDirEditor();
      });

      document.getElementById("gameDirField").addEventListener("input", () => {
        syncGameDirEditor();
      });

      document.getElementById("gameDirField").addEventListener("keydown", async (event) => {
        if (event.key === "Enter") {
          event.preventDefault();
          if (!document.getElementById("confirmGameDirBtn").classList.contains("hidden")) {
            document.getElementById("confirmGameDirBtn").click();
          }
        }
      });

      document.getElementById("confirmGameDirBtn").addEventListener("click", async () => {
        const selectedPath = document.getElementById("gameDirField").value.trim();
        if (!selectedPath) {
          await showMessage("目录路径不能为空。", "设置失败");
          return;
        }
        try {
          const message = await postAction("set-game-dir", { path: selectedPath });
          showNotice(message, "success");
        } catch (error) {
          showNotice(error.message, "error");
          await showMessage(error.message, "设置失败");
        }
      });

      document.getElementById("debugLink").addEventListener("click", () => {
        document.getElementById("debugPanel").classList.remove("debug-hidden");
      });
      document.getElementById("hideDebugBtn").addEventListener("click", () => {
        document.getElementById("debugPanel").classList.add("debug-hidden");
      });
      document.getElementById("importNewBeeBoxBtn").addEventListener("click", async () => {
        try {
          const message = await postAction("import-newbeebox");
          showNotice(message, "success");
        } catch (error) {
          showNotice(error.message, "error");
          await showMessage(error.message, "导入失败");
        }
      });
      document.getElementById("restoreBackupBtn").addEventListener("click", async () => {
        const ok = await askConfirm("确认恢复备份", "确认恢复最近一次推荐备份吗？\n\n程序会先关闭 Battle.net / Agent，再恢复推荐备份并重新启动 Battle.net。");
        if (!ok) {
          return;
        }
        try {
          const message = await postAction("restore-latest-backup");
          showNotice(message, "success");
        } catch (error) {
          showNotice(error.message, "error");
          await showMessage(error.message, "恢复失败");
        }
      });
      document.getElementById("backupStateBtn").addEventListener("click", async () => {
        try {
          const message = await postAction("backup-current-state");
          showNotice(message, "success");
        } catch (error) {
          showNotice(error.message, "error");
          await showMessage(error.message, "备份失败");
        }
      });
      document.getElementById("diagnosticSnapshotBtn").addEventListener("click", async () => {
        const result = await askForm({
          title: "诊断快照",
          hint: "请输入本次诊断快照标签。",
          submitText: "保存",
          fields: [
            { name: "label", label: "快照标签", value: "manual-check" }
          ]
        });
        if (!result) {
          return;
        }
        try {
          const message = await postAction("save-diagnostic-snapshot", result);
          showNotice(message, "success");
        } catch (error) {
          showNotice(error.message, "error");
          await showMessage(error.message, "诊断快照失败");
        }
      });
      document.getElementById("compareDiagnosticsBtn").addEventListener("click", async () => {
        try {
          const message = await postAction("compare-latest-diagnostics");
          showNotice(message, "success");
        } catch (error) {
          showNotice(error.message, "error");
          await showMessage(error.message, "对比失败");
        }
      });

      const aboutDialog = document.getElementById("aboutDialog");
      const openAbout = () => aboutDialog.showModal();
      document.getElementById("aboutLink").addEventListener("click", openAbout);
      document.getElementById("closeAboutTop").addEventListener("click", () => aboutDialog.close());
      aboutDialog.addEventListener("click", (event) => {
        const rect = aboutDialog.getBoundingClientRect();
        const inside = rect.top <= event.clientY && event.clientY <= rect.top + rect.height
          && rect.left <= event.clientX && event.clientX <= rect.left + rect.width;
        if (!inside) {
          aboutDialog.close();
        }
      });

      const formDialog = document.getElementById("formDialog");
      const formEl = document.getElementById("formDialogForm");
      document.getElementById("formDialogClose").addEventListener("click", () => {
        closeDialog(formDialog);
        if (state.formResolve) {
          state.formResolve.resolve(null);
          state.formResolve = null;
        }
      });
      document.getElementById("formDialogCancel").addEventListener("click", () => {
        closeDialog(formDialog);
        if (state.formResolve) {
          state.formResolve.resolve(null);
          state.formResolve = null;
        }
      });
      formEl.addEventListener("submit", (event) => {
        event.preventDefault();
        if (!state.formResolve) {
          closeDialog(formDialog);
          return;
        }
        const data = {};
        state.formResolve.config.fields.forEach((field) => {
          const el = formEl.querySelector(`[data-field="${field.name}"]`);
          data[field.name] = el ? el.value.trim() : "";
        });
        state.formResolve.resolve(data);
        state.formResolve = null;
        closeDialog(formDialog);
      });

      const confirmDialog = document.getElementById("confirmDialog");
      document.getElementById("confirmDialogCancel").addEventListener("click", () => {
        closeDialog(confirmDialog);
        if (state.confirmResolve) {
          state.confirmResolve(false);
          state.confirmResolve = null;
        }
      });
      document.getElementById("confirmDialogOk").addEventListener("click", () => {
        closeDialog(confirmDialog);
        if (state.confirmResolve) {
          state.confirmResolve(true);
          state.confirmResolve = null;
        }
      });

      const messageDialog = document.getElementById("messageDialog");
      document.getElementById("messageDialogOk").addEventListener("click", () => {
        closeDialog(messageDialog);
        if (state.messageResolve) {
          state.messageResolve(true);
          state.messageResolve = null;
        }
      });
    }

    async function bootstrap() {
      state.hasDesktopBridge = Boolean(window.pywebview?.api?.choose_directory);
      clearNotice();
      const response = await fetch("/api/state");
      const data = await response.json();
      const payload = data.state;
      state.selectedEmail = payload.accounts[0]?.email || "";
      applyState(payload);
      bindStaticActions();
    }

    window.addEventListener("pywebviewready", () => {
      state.hasDesktopBridge = Boolean(window.pywebview?.api?.choose_directory);
    });

    bootstrap().catch((error) => {
      console.error(error);
      showNotice(`加载预览数据失败：${error.message}`, "error");
      showMessage(`加载预览数据失败：${error.message}`, "启动失败");
    });
  </script>
</body>
</html>
